<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Usuario - TechPOS</title>
    <!-- Bootstrap 5 CSS para estilos responsivos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4" style="max-width: 500px;">
    <!-- Título dinámico: si el usuario tiene ID (edición) o no (creación) -->
    <h2 th:text="${objUsuario.idUsuario == null} ? 'Crear Usuario' : 'Editar Usuario'"></h2>

    <!--
        FORMULARIO DE USUARIO
        - th:action="@{/usuarios/guardar}" → envía los datos al controlador Spring.
        - th:object="${objUsuario}" → vincula el formulario con el objeto usuario.
        - method="post" → envía por POST (seguro, no muestra datos en URL).
    -->
    <form th:action="@{/usuarios/guardar}" th:object="${objUsuario}" method="post">

        <!-- Campo oculto para el ID (necesario para actualizar en edición) -->
        <input type="hidden" th:field="*{idUsuario}">

        <!-- ==================== NOMBRE COMPLETO ==================== -->
        <div class="mb-3">
            <label class="form-label">Nombre Completo</label>
            <input type="text"
                   th:field="*{nombre}"
                   class="form-control"
                   th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid' : ''"
                   required>
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('nombre')}"
                 th:errors="*{nombre}">
                Error en el nombre
            </div>
        </div>

        <!-- ==================== NOMBRE DE USUARIO (LOGIN) ==================== -->
        <div class="mb-3">
            <label class="form-label">Nombre de Usuario (Login)</label>
            <input type="text"
                   th:field="*{usuario}"
                   class="form-control"
                   th:classappend="${#fields.hasErrors('usuario')} ? 'is-invalid' : ''"
                   required>
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('usuario')}"
                 th:errors="*{usuario}">
                Error en el nombre de usuario
            </div>
        </div>

        <!-- ==================== CONTRASEÑA (CON TOGGLE MOSTRAR/OCULTAR) ==================== -->
        <div class="mb-3">
            <label class="form-label">Contraseña</label>

            <!-- Grupo de entrada (input + botón) -->
            <div class="input-group">
                <!--
                    th:field="*{contrasena}" → enlaza con la propiedad 'contrasena' del objeto.
                    El atributo 'type' se definirá dinámicamente con JavaScript (por defecto 'password').
                    'required' solo cuando es un nuevo usuario (idUsuario == null).
                -->
                <input type="password"
                       id="passwordField"
                       th:field="*{contrasena}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('contrasena')} ? 'is-invalid' : ''"
                       th:required="${objUsuario.idUsuario == null}"
                       pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$"
                       title="Mínimo 8 caracteres, debe incluir mayúscula, minúscula y número. Se permiten símbolos como *">

                <!-- Botón para mostrar/ocultar contraseña -->
                <button class="btn btn-outline-secondary" type="button" id="togglePasswordBtn">
                    👁️
                </button>
            </div>

            <!-- Mensaje de error de validación (Spring) -->
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('contrasena')}"
                 th:errors="*{contrasena}">
            </div>

            <!-- Mensaje informativo en modo edición: dejar vacío para no cambiar -->
            <small th:if="${objUsuario.idUsuario != null}" class="text-muted">
                Dejar en blanco para mantener la contraseña actual.
            </small>

            <!-- Ayuda sobre formato de contraseña (solo al crear) -->
            <small id="passwordHelpBlock"
                   class="form-text text-muted"
                   th:if="${objUsuario.idUsuario == null}">
                Mínimo 8 caracteres: letras (mayúsculas/minúsculas) y números.
            </small>
        </div>

        <!-- ==================== ROL DEL SISTEMA ==================== -->
        <div class="mb-3">
            <label class="form-label">Rol del Sistema</label>
            <select th:field="*{rol}" class="form-select">
                <option value="administrador">Administrador</option>
                <option value="tecnico">Técnico</option>
                <option value="recepcionista">Recepcionista</option>
                <option value="inventario">Inventario</option>
            </select>
        </div>

        <!-- ==================== CHECKBOX ACTIVO ==================== -->
        <div class="mb-3 form-check">
            <input type="checkbox"
                   th:field="*{activo}"
                   class="form-check-input"
                   id="checkActivo">
            <label class="form-check-label" for="checkActivo">
                Usuario Activo
            </label>
        </div>

        <!-- ==================== BOTONES DE ACCIÓN ==================== -->
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary">
                Guardar Cambios
            </button>
            <a th:href="@{/usuarios}" class="btn btn-secondary">
                Cancelar
            </a>
        </div>

    </form>
</div>

<!-- ==================== JAVASCRIPT: TOGGLE MOSTRAR/OCULTAR CONTRASEÑA ==================== -->
<script>
    // Obtener referencias al campo de contraseña y al botón
    const passwordInput = document.getElementById('passwordField');
    const toggleButton = document.getElementById('togglePasswordBtn');

    // Verificar que ambos elementos existan en el DOM
    if (passwordInput && toggleButton) {
        // Agregar evento click al botón
        toggleButton.addEventListener('click', function () {
            // Obtener el tipo actual del campo (password o text)
            const currentType = passwordInput.getAttribute('type');
            // Cambiar al tipo opuesto usando operador ternario
            const newType = currentType === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', newType);

            // Cambiar el ícono/emoji para retroalimentación visual
            // Si está visible (text) → mostrar 🙈 (ocultar), si está oculto (password) → mostrar 👁️ (ver)
            this.textContent = newType === 'password' ? '👁️' : '🙈';
        });
    }
</script>

</body>
</html>
