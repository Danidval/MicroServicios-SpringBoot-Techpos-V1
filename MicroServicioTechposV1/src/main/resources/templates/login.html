<!-- ================================================================== -->
<!-- PÁGINA DE LOGIN - TechPOS                                          -->
<!-- ================================================================== -->
<!--
    Propósito: Autenticación de usuarios en el sistema TechPOS.
    Spring Security procesa el formulario y redirige según el resultado:
      - Login exitoso       → /dashboard
      - Credenciales inválidas → /login?error (muestra mensaje de error)
      - Cierre de sesión    → /login?logout (muestra mensaje de cierre)
-->
<!DOCTYPE html>
<!--
    xmlns:th="http://www.thymeleaf.org"
    Habilita los atributos de Thymeleaf en el HTML:
      - th:action   → define dinámicamente la URL de destino del formulario.
      - th:if       → renderiza condicionalmente elementos (ej. mensajes de error/logout).
      - th:field    → enlaza campos con propiedades de un objeto (no usado aquí pero documentado).
-->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">                              <!-- Soporta tildes, eñes, emojis -->
    <title>Login - TechPOS</title>                     <!-- Título en la pestaña del navegador -->

    <!-- Bootstrap 5.3 (CSS) – Estilos responsivos y componentes -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">                                <!-- Fondo gris claro para contraste -->

<div class="container mt-5" style="max-width: 400px;"> <!-- Contenedor centrado y angosto -->
    <div class="card shadow">                           <!-- Tarjeta con sombra (efecto elevado) -->

        <!-- CABECERA DE LA TARJETA (azul primario, texto blanco) -->
        <div class="card-header bg-primary text-white text-center">
            <h3>🔧 TechPOS</h3>
        </div>

        <!-- CUERPO DE LA TARJETA: formulario y mensajes condicionales -->
        <div class="card-body">

            <!-- ========================================================== -->
            <!-- FORMULARIO DE LOGIN                                        -->
            <!--================================================================
            th:action="@{/login}" → Spring Security intercepta esta URL (POST).
            Los nombres de los campos DEBEN ser "username" y "password".
            -->
            <form th:action="@{/login}" method="post">

                <!-- CAMPO: NOMBRE DE USUARIO -->
                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input type="text" name="username"
                           class="form-control"
                           required
                           autofocus
                           placeholder="Ingresa tu usuario">
                    <!--
                        required   → validación HTML5 (no permite vacío)
                        autofocus  → el cursor inicia aquí al cargar la página
                    -->
                </div>

                <!-- CAMPO: CONTRASEÑA (con botón para mostrar/ocultar) -->
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>

                    <!-- Grupo input + botón (Bootstrap Input Group) -->
                    <div class="input-group">
                        <input type="password" name="password"
                               id="passwordField"
                               class="form-control"
                               required
                               placeholder="Escribe tu contraseña">
                        <!--
                            Botón para mostrar/ocultar contraseña.
                            type="button" → evita que envíe el formulario.
                            Al hacer clic, cambia el tipo del campo entre "password" y "text".
                        -->
                        <button class="btn btn-outline-secondary" type="button" id="togglePasswordBtn">
                            👁️
                        </button>
                    </div>
                    <!--
                        NOTA: El ícono 👁️ es universal y no requiere librerías externas.
                        Si prefieres Bootstrap Icons, reemplaza por <i class="bi bi-eye"></i>
                        y agrega el CDN de Bootstrap Icons.
                    -->
                </div>

                <!-- BOTÓN DE ENVÍO (ancho completo) -->
                <button type="submit" class="btn btn-primary w-100">
                    Iniciar sesión
                </button>
            </form>

            <!-- ========================================================== -->
            <!-- MENSAJES CONDICIONALES (error / logout)                   -->
            <!-- ========================================================== -->
            <!--
                th:if="${param.error}"   → se activa si la URL contiene ?error
                th:if="${param.logout}"  → se activa si la URL contiene ?logout
                Spring Security añade estos parámetros automáticamente.
            -->
            <div th:if="${param.error}" class="alert alert-danger mt-3">
                ❌ Usuario o contraseña incorrectos
            </div>

            <div th:if="${param.logout}" class="alert alert-info mt-3">
                🔓 Sesión cerrada correctamente
            </div>

        </div> <!-- Fin card-body -->
    </div> <!-- Fin card -->
</div> <!-- Fin container -->

<!-- ========================================================== -->
<!-- JAVASCRIPT: FUNCIONALIDAD "MOSTRAR/OCULTAR CONTRASEÑA"    -->
<!-- ========================================================== -->
<script>
    // 1. Obtener referencias al campo de contraseña y al botón
    const passwordInput = document.getElementById('passwordField');
    const toggleButton = document.getElementById('togglePasswordBtn');

    // 2. Asegurar que los elementos existen (seguridad)
    if (passwordInput && toggleButton) {
        // 3. Evento click en el botón
        toggleButton.addEventListener('click', function () {
            // Obtener el tipo actual del input
            const currentType = passwordInput.getAttribute('type');
            // Cambiar entre 'password' (oculta) y 'text' (visible)
            const newType = currentType === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', newType);

            // Opcional: cambiar el emoji/icono del botón para feedback visual
            // Si es texto visible → mostrar ícono de "ocultar" (🙈), si está oculto → mostrar 👁️
            this.textContent = newType === 'password' ? '👁️' : '🙈';
        });
    }
</script>

<!--
    EXPLICACIÓN DEL OPERADOR TERNARIO USADO EN EL SCRIPT:
    newType = currentType === 'password' ? 'text' : 'password';
    Significado:
        Si la contraseña está actualmente oculta (type="password")
        entonces la cambiamos a visible (type="text"),
        de lo contrario la volvemos a ocultar (type="password").
-->
</body>
</html>
