# ============================================================
# APPLICATION.PROPERTIES - TechPOS V3
# ============================================================
# Este archivo contiene la configuración principal de la aplicación Spring Boot.
# Define: nombre de la app, conexión a MySQL, JPA/Hibernate, Thymeleaf y logging.

# ------------------------------------------------------------
# NOMBRE DE LA APLICACIÓN
# ------------------------------------------------------------
# Define el nombre de la aplicación Spring Boot (se usa en logs y administración)
spring.application.name=MicroServicioTechposV1

# ------------------------------------------------------------
# CONFIGURACIÓN DE MYSQL (Base de datos)
# ------------------------------------------------------------

# URL de conexión a la base de datos MySQL
# - jdbc:mysql://localhost:3306/bd_techposv2 → servidor local, puerto 3306, base de datos 'bd_techposv2'
# - useSSL=false → deshabilita SSL para desarrollo (en producción debe ser true)
# - serverTimezone=America/Bogota → zona horaria de Colombia (evita errores con fechas)
# - allowPublicKeyRetrieval=true → permite recuperar clave pública (necesario en algunos MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/bd_techposv2?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true

# Usuario de la base de datos (por defecto 'root' en XAMPP/WAMP/MAMP)
spring.datasource.username=root

# Contraseña del usuario de la base de datos (en este caso '3333' - cámbiala según tu entorno)
spring.datasource.password=3333

# Driver JDBC para MySQL (clase que implementa la conexión)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ------------------------------------------------------------
# CONFIGURACIÓN DE JPA / HIBERNATE (ORM)
# ------------------------------------------------------------

# --- ESTRATEGIA DE NOMBRES (Vital para respetar camelCase: idUsuario) ---
# Hibernate por defecto convierte 'idUsuario' a 'id_usuario'.
# Con esta estrategia, se respeta exactamente el nombre de columna definido en @Column.
# PhysicalNamingStrategyStandardImpl → usa los nombres exactos de las anotaciones @Column.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Estrategia implícita (complementaria a la física)
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyComponentPathImpl

# --- ACCIÓN DE DDL (creación/actualización de esquema) ---
# 'validate' → solo verifica que la estructura de la BD coincida con las entidades.
# NO crea ni modifica tablas automáticamente. Es seguro para producción.
# Otras opciones: none, update, create, create-drop.
spring.jpa.hibernate.ddl-auto=validate

# --- OTROS (mostrar SQL y dialecto) ---
# Muestra en consola las sentencias SQL generadas por Hibernate (útil para depuración)
spring.jpa.show-sql=true

# Dialecto específico para MySQL (optimiza las consultas según el motor)
# Usar MySQLDialect (no obsoleto) en lugar de MySQL8Dialect o MySQL5Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ------------------------------------------------------------
# CONFIGURACIÓN DE THYMELEAF (motor de plantillas)
# ------------------------------------------------------------
# Deshabilita la caché de Thymeleaf en desarrollo.
# Así los cambios en HTML se ven inmediatamente sin reiniciar el servidor.
# En producción se debe eliminar o poner 'true'.
spring.thymeleaf.cache=false

# ------------------------------------------------------------
# CONFIGURACIÓN DE LOGGING (registro de eventos)
# ------------------------------------------------------------
# Nivel DEBUG para Spring Security: muestra detalles de autenticación, roles, etc.
# Útil para depurar problemas de login y autorización.
logging.level.org.springframework.security=DEBUG